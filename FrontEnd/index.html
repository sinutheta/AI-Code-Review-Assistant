<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Code Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">&#9650;</span>
        <span class="logo-text">CodeReview<em>AI</em></span>
      </div>
      <nav class="nav-links">
        <a href="#" class="nav-item active">Review</a>
        <a href="#" class="nav-item">History</a>
        <a href="#" class="nav-item">Settings</a>
      </nav>
      <div class="sidebar-footer">
        <span>Powered by Groq + Llama&nbsp;3.3</span>
      </div>
    </aside>

    <main class="main">

      <div class="top-bar">
        <div class="top-bar-left">
          <h1>Code Review</h1>
          <p class="subtitle">Instant AI-powered analysis — bugs, security, performance & more</p>
        </div>
        <div class="top-bar-right">
          <select id="langSelect" class="lang-select">
            <option value="auto">Auto-detect</option>
            <option value="JavaScript">JavaScript</option>
            <option value="TypeScript">TypeScript</option>
            <option value="Python">Python</option>
            <option value="Java">Java</option>
            <option value="C++">C++</option>
            <option value="Go">Go</option>
            <option value="Rust">Rust</option>
            <option value="PHP">PHP</option>
            <option value="Ruby">Ruby</option>
            <option value="SQL">SQL</option>
          </select>
        </div>
      </div>

      <div class="editor-panel">
        <div class="editor-header">
          <div class="editor-dots">
            <span></span><span></span><span></span>
          </div>
          <span class="editor-label" id="editorLabel">untitled</span>
          <div class="editor-actions">
            <button class="icon-btn" id="clearBtn" title="Clear">&#10005;</button>
            <button class="icon-btn" id="copyInputBtn" title="Copy code">&#10063;</button>
          </div>
        </div>
        <textarea
          id="codeInput"
          spellcheck="false"
          placeholder="// Paste your code here and click Analyze...&#10;&#10;function example() {&#10;  return 'ready for review';&#10;}"></textarea>
        <div class="editor-footer">
          <span id="lineCount">0 lines</span>
          <span id="charCount">0 chars</span>
        </div>
      </div>

      <div class="analyze-bar">
        <button id="analyzeBtn" onclick="reviewCode()">
          <span class="btn-icon">&#9654;</span>
          Analyze Code
        </button>
        <div id="loadingIndicator" class="loading-indicator hidden">
          <div class="spinner"></div>
          <span id="loadingText">Analyzing with AI...</span>
        </div>
      </div>

      <div id="resultsSection" class="results hidden">

        <div class="results-header">
          <div class="score-block">
            <div class="score-ring-wrap">
              <svg class="score-ring" viewBox="0 0 64 64">
                <circle class="ring-bg" cx="32" cy="32" r="26" />
                <circle class="ring-fill" id="scoreRing" cx="32" cy="32" r="26" />
              </svg>
              <span class="score-num" id="scoreNum">—</span>
            </div>
            <div class="score-meta">
              <span class="score-label" id="scoreLabel">—</span>
              <span class="score-lang" id="detectedLang">—</span>
            </div>
          </div>
          <div class="summary-block">
            <p id="summaryText"></p>
          </div>
          <div class="pill-counts" id="pillCounts"></div>
        </div>

        <div class="tabs" id="tabs">
          <button class="tab active" data-tab="bugs">Bugs <span class="tab-badge" id="bugsBadge">0</span></button>
          <button class="tab" data-tab="security">Security <span class="tab-badge" id="secBadge">0</span></button>
          <button class="tab" data-tab="performance">Performance <span class="tab-badge" id="perfBadge">0</span></button>
          <button class="tab" data-tab="improvements">Improvements <span class="tab-badge" id="impBadge">0</span></button>
          <button class="tab" data-tab="positives">Positives <span class="tab-badge" id="posBadge">0</span></button>
        </div>

        <div class="tab-content" id="tabContent"></div>

        <div class="results-actions">
          <button class="action-btn" id="copyReportBtn">Copy Report</button>
          <button class="action-btn secondary" id="newReviewBtn">New Review</button>
        </div>

      </div>

      <div id="errorBox" class="error-box hidden"></div>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
